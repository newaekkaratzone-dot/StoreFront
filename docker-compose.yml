version: '3.8'

services:
  db:
    image: postgres:15
    container_name: storefront_db
    environment:
      POSTGRES_USER: storefront_user
      POSTGRES_PASSWORD: storefront_password
      POSTGRES_DB: store
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: storefront_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@storefront.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  pgdata:
